<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xác nhận tham dự – Đỗ Đạt Thành &amp; Dương Thị Thu Thuỷ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app">
  <div class="submit-page__back">
    <a href="index.html" class="submit-page__back-link">← Trở về trang chủ</a>
  </div>

  <section class="rsvp">
    <div class="section-wrap">
      <div class="section-header">
        <h2>Xác nhận tham dự</h2>
        <p class="section-ornament">✦</p>
      </div>

      <div class="rsvp__card">
        <p class="rsvp__success" id="rsvp-success" style="display:none">
          Cảm ơn bạn đã xác nhận!<br />Chúng tôi rất vui được đón tiếp bạn. 🤍
        </p>

        <form id="rsvp-form">
          <div class="rsvp__field">
            <label for="name">Họ và tên *</label>
            <input id="name" name="name" type="text" required placeholder="Nguyễn Văn A" />
          </div>
          <div class="rsvp__field">
            <label for="event">Sự kiện tham dự *</label>
            <select id="event" name="event" required>
              <option value="" disabled selected>-- Chọn sự kiện --</option>
              <option value="tiec-cuoi-nha-gai">Tiệc Cưới – Nhà Gái · 11:00, Chủ Nhật 19/07/2026</option>
              <option value="tiec-cuoi-nha-trai">Tiệc Cưới – Nhà Trai · 11:00, Chủ Nhật 26/07/2026</option>
            </select>
          </div>
          <div class="rsvp__field">
            <label for="guests">Số người tham dự *</label>
            <select id="guests" name="guests">
              <option value="1">1 người</option>
              <option value="2">2 người</option>
              <option value="3">3 người</option>
              <option value="4">4 người</option>
            </select>
          </div>
          <div class="rsvp__field">
            <label for="message">Lời chúc mừng</label>
            <textarea id="message" name="message" rows="4" placeholder="Chúc mừng hạnh phúc..."></textarea>
          </div>
          <p class="rsvp__error" id="rsvp-error" style="display:none">Có lỗi xảy ra, vui lòng thử lại.</p>
          <button type="submit" id="rsvp-btn" class="rsvp__btn">Gửi xác nhận</button>
        </form>
      </div>
    </div>
  </section>

   <footer class="footer">
      <div class="footer__inner">
        <p class="footer__names">
          <span>Đỗ Đạt Thành</span>
          <span class="footer__ampersand">&amp;</span>
          <span>Dương Thị Thu Thuỷ</span>
        </p>
        <div class="footer__ornament">
          <span class="footer__ornament-line"></span>
          <span class="footer__ornament-dot"></span>
          <span class="footer__ornament-line"></span>
        </div>
        <p class="footer__copy">Made with ♥</p>
      </div>
    </footer>
</div>

<button class="back-to-top" id="back-to-top" aria-label="Về đầu trang">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<script src="js/app.js"></script>
</body>
</html>

  <!-- ── Lightbox ── -->
  <div class="gp__lightbox" id="gp-lightbox" role="dialog" aria-modal="true" style="display:none">
    <button class="gp__lb-btn gp__lb-close" id="gp-lb-close" aria-label="Đóng">✕</button>
    <button class="gp__lb-btn gp__lb-prev" id="gp-lb-prev" aria-label="Ảnh trước">‹</button>
    <figure class="gp__lb-figure">
      <img src="" alt="" id="gp-lb-img" />
      <figcaption class="gp__lb-caption" id="gp-lb-cap"></figcaption>
    </figure>
    <button class="gp__lb-btn gp__lb-next" id="gp-lb-next" aria-label="Ảnh tiếp theo">›</button>
  </div>

<script>
  const items  = Array.from(document.querySelectorAll('.gp__item'))
  const lb     = document.getElementById('gp-lightbox')
  const lbImg  = document.getElementById('gp-lb-img')
  const lbCap  = document.getElementById('gp-lb-cap')
  let current  = 0

  function open(i) {
    current = i
    const thumb = items[i].querySelector('img')
    // Show thumbnail immediately as blurred placeholder
    lbImg.src = thumb.src
    lbImg.classList.add('gp__lb-loading')
    lbCap.textContent = (i + 1) + ' / ' + items.length
    lb.style.display = 'flex'
    document.body.style.overflow = 'hidden'
    // Load full image on demand
    const full = new Image()
    full.onload = () => {
      if (current === i) {
        lbImg.src = full.src
        lbImg.classList.remove('gp__lb-loading')
      }
    }
    full.src = thumb.dataset.full
  }
  function close() { lb.style.display = 'none'; document.body.style.overflow = '' }

  items.forEach((btn, i) => btn.addEventListener('click', () => open(i)))
  document.getElementById('gp-lb-close').addEventListener('click', close)
  document.getElementById('gp-lb-prev').addEventListener('click', () => open((current - 1 + items.length) % items.length))
  document.getElementById('gp-lb-next').addEventListener('click', () => open((current + 1) % items.length))
  lb.addEventListener('click', e => { if (e.target === lb) close() })
  document.addEventListener('keydown', e => {
    if (lb.style.display === 'none') return
    if (e.key === 'Escape')     close()
    if (e.key === 'ArrowLeft')  open((current - 1 + items.length) % items.length)
    if (e.key === 'ArrowRight') open((current + 1) % items.length)
  })
</script>

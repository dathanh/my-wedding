<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bộ ảnh cưới – Đỗ Đạt Thành &amp; Dương Thị Thu Thuỷ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Hero banner ── -->
  <header class="gp__hero" style="background-image: url('gallery/pre-wedding/1.webp')">
    <div class="gp__hero-veil"></div>
    <div class="gp__hero-content">
      <p class="gp__hero-tag">Album ảnh</p>
      <h1 class="gp__hero-title">Bộ ảnh cưới</h1>
      <p class="gp__hero-ornament">✦</p>
      <p class="gp__hero-count">Đỗ Đạt Thành &amp; Dương Thị Thu Thuỷ</p>
    </div>
    <a href="index.html" class="gp__back">← Trang chủ</a>
  </header>

  <!-- ── Category cards ── -->
  <main class="gallery" style="padding: 60px 24px;">
    <div class="section-wrap">
      <div class="gallery__categories" id="gallery-categories"></div>
    </div>
  </main>

  <!-- ── Footer ── -->
  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__names">
        Đỗ Đạt Thành
        <span class="footer__ampersand">&amp;</span>
        Dương Thị Thu Thuỷ
      </p>
      <div class="footer__ornament">
        <span class="footer__ornament-line"></span>
        <span class="footer__ornament-dot"></span>
        <span class="footer__ornament-line"></span>
      </div>
      <p class="footer__date">Chủ nhật, ngày 26 tháng 07 năm 2026</p>
      <a href="https://maps.app.goo.gl/ffHFJQEdy8szgJbk9" target="_blank" rel="noreferrer" class="footer__map">
        📍 Sảnh Diamond 1
      </a>
      <p class="footer__copy">Made with ♥</p>
    </div>
  </footer>

<button class="back-to-top" id="back-to-top" aria-label="Về đầu trang">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<script src="js/app.js"></script>
</body>
</html>
